name: Build FongMi TV APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew

      - name: Build arm64_v8a
        run: |
          echo "Build arm64_v8a started at: $(date)"
          ./gradlew :app:assembleLeanbackArm64_v8aDebug --stacktrace 2>&1 | tee build-arm64.log
          echo "Build arm64_v8a finished at: $(date)"

      - name: Build armeabi_v7a
        run: |
          echo "Build armeabi_v7a started at: $(date)"
          ./gradlew :app:assembleLeanbackArmeabi_v7aDebug --stacktrace 2>&1 | tee build-armeabi.log
          echo "Build armeabi_v7a finished at: $(date)"

      - name: Show APKs
        run: |
          echo "=== ALL APKs ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-apks
          path: app/build/outputs/**/*.apk
          if-no-files-found: error
