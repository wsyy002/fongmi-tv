name: Build FongMi TV APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew

      - name: Build
        run: |
          echo "Starting build..."
          echo "Build started at: $(date)"
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log || true
          echo "Build finished at: $(date)"
          echo "Build finished. Checking for errors..."
          grep -i "error\|exception\|cannot\|FAILED\|Caused by:" build.log 2>/dev/null | head -20 || echo "(no common errors found)"
          echo "=== LAST 40 LINES ==="
          tail -40 build.log
          echo "=== END ==="
