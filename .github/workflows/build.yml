name: Build FongMi TV APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew

      - name: Build
        run: |
          echo "Build started at: $(date)"
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log || true
          echo "Build finished at: $(date)"
      
      - name: Find APKs
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Number found ==="
          find . -name "*.apk" -type f 2>/dev/null | wc -l

      - name: Upload leanback arm64
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-arm64_v8a
          path: |
            app/build/outputs/apk/*/*/*.apk
          if-no-files-found: warn

      - name: Upload leanback armeabi
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-armeabi_v7a
          path: |
            app/build/outputs/apk/*/*/*.apk
          if-no-files-found: warn
