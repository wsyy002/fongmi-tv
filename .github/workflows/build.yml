name: Build FongMi TV APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build arm64-v8a
        run: ./gradlew assembleLeanbackArm64_v8aDebug --stacktrace --no-daemon

      - name: Upload APK (64-bit)
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-leanback-arm64_v8a
          path: app/build/outputs/apk/leanbackArm64_v8a/debug/*.apk

      - name: Build armeabi-v7a (32-bit)
        run: ./gradlew assembleLeanbackArmeabi_v7aDebug --stacktrace --no-daemon

      - name: Upload APK (32-bit)
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-leanback-armeabi_v7a
          path: app/build/outputs/apk/leanbackArmeabi_v7a/debug/*.apk
