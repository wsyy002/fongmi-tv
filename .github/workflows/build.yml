name: Build FongMi TV APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew

      - name: Build arm64_v8a
        run: |
          echo "Build arm64_v8a started at: $(date)"
          ./gradlew :app:assembleLeanbackArm64_v8aDebug --stacktrace 2>&1 | tee build-arm64.log
          echo "Build arm64_v8a finished at: $(date)"

      - name: Build armeabi_v7a
        run: |
          echo "Build armeabi_v7a started at: $(date)"
          ./gradlew :app:assembleLeanbackArmeabi_v7aDebug --stacktrace 2>&1 | tee build-armeabi.log
          echo "Build armeabi_v7a finished at: $(date)"

      - name: Collect APKs to known location
        run: |
          mkdir -p apk-artifacts
          find . -name "*.apk" -type f -exec cp {} apk-artifacts/ \;
          ls -la apk-artifacts/
          echo "=== Count ==="
          ls apk-artifacts/*.apk 2>/dev/null | wc -l

      - name: Upload arm64_v8a
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-arm64_v8a
          path: apk-artifacts/*arm64*apk
          if-no-files-found: warn

      - name: Upload armeabi_v7a
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-armeabi_v7a
          path: apk-artifacts/*armeabi*apk
          if-no-files-found: warn

      - name: Upload universal (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-all-APKs
          path: apk-artifacts/*.apk
          if-no-files-found: error
