name: Build FongMi TV APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew

      - name: Build arm64_v8a
        run: ./gradlew :app:assembleLeanbackArm64_v8aDebug --stacktrace

      - name: Build armeabi_v7a
        run: ./gradlew :app:assembleLeanbackArmeabi_v7aDebug --stacktrace

      - name: Prepare APKs
        run: |
          echo "Looking for APKs..."
          find . -name "*.apk" -type f
          echo "---"
          mkdir -p upload
          find . -name "*.apk" -type f -exec cp -v {} upload/ \;
          ls -la upload/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-apks
          path: upload/
          if-no-files-found: error
