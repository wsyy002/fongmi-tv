name: Build FongMi TV APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all TV variants
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-tv-leanback-APK
          path: |
            app/build/outputs/apk/leanbackArm64_v8a/debug/*.apk
            app/build/outputs/apk/leanbackArmeabi_v7a/debug/*.apk
          if-no-files-found: error
